<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="420" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">How Consensus Trading Works</text>

  <!-- Left box: 7 Strategies -->
  <rect x="30" y="60" width="320" height="330" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="190" y="88" text-anchor="middle" fill="#8b949e" font-size="13" font-weight="bold">7 STRATEGIES TRADE INDEPENDENTLY</text>

  <!-- Strategy rows -->
  <rect x="50" y="105" width="280" height="32" rx="6" fill="#1c6e3a" opacity="0.3"/>
  <circle cx="68" cy="121" r="8" fill="#3fb950"/><text x="85" y="126" fill="#e6edf3" font-size="13">Value</text>
  <text x="310" y="126" text-anchor="end" fill="#3fb950" font-size="12">buying</text>

  <rect x="50" y="143" width="280" height="32" rx="6" fill="#1c6e3a" opacity="0.3"/>
  <circle cx="68" cy="159" r="8" fill="#3fb950"/><text x="85" y="164" fill="#e6edf3" font-size="13">Momentum</text>
  <text x="310" y="164" text-anchor="end" fill="#3fb950" font-size="12">buying</text>

  <rect x="50" y="181" width="280" height="32" rx="6" fill="#1c6e3a" opacity="0.3"/>
  <circle cx="68" cy="197" r="8" fill="#3fb950"/><text x="85" y="202" fill="#e6edf3" font-size="13">Balanced</text>
  <text x="310" y="202" text-anchor="end" fill="#3fb950" font-size="12">buying</text>

  <rect x="50" y="219" width="280" height="32" rx="6" fill="#6e1c1c" opacity="0.4"/>
  <circle cx="68" cy="235" r="8" fill="#f85149"/><text x="85" y="240" fill="#e6edf3" font-size="13">Defensive</text>
  <text x="310" y="240" text-anchor="end" fill="#f85149" font-size="12">DEFENSE</text>

  <rect x="50" y="257" width="280" height="32" rx="6" fill="#1c3d6e" opacity="0.3"/>
  <circle cx="68" cy="273" r="8" fill="#58a6ff"/><text x="85" y="278" fill="#e6edf3" font-size="13">EventDriven</text>
  <text x="310" y="278" text-anchor="end" fill="#8b949e" font-size="12">holding</text>

  <rect x="50" y="295" width="280" height="32" rx="6" fill="#1c6e3a" opacity="0.3"/>
  <circle cx="68" cy="311" r="8" fill="#3fb950"/><text x="85" y="316" fill="#e6edf3" font-size="13">Adaptive</text>
  <text x="310" y="316" text-anchor="end" fill="#3fb950" font-size="12">MOMENTUM</text>

  <rect x="50" y="333" width="280" height="32" rx="6" fill="#1c3d6e" opacity="0.3"/>
  <circle cx="68" cy="349" r="8" fill="#58a6ff"/><text x="85" y="354" fill="#e6edf3" font-size="13">Commodity</text>
  <text x="310" y="354" text-anchor="end" fill="#8b949e" font-size="12">in cash</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
  </defs>
  <line x1="360" y1="225" x2="415" y2="225" stroke="#58a6ff" stroke-width="3" marker-end="url(#arrowhead)"/>
  <text x="388" y="215" text-anchor="middle" fill="#58a6ff" font-size="11">live</text>
  <text x="388" y="242" text-anchor="middle" fill="#58a6ff" font-size="11">state</text>

  <!-- Middle box: Consensus -->
  <rect x="425" y="120" width="220" height="210" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="535" y="148" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="bold">CONSENSUS</text>

  <text x="535" y="178" text-anchor="middle" fill="#e6edf3" font-size="13">4 bullish</text>
  <text x="535" y="198" text-anchor="middle" fill="#f85149" font-size="13">1 in DEFENSE</text>
  <text x="535" y="218" text-anchor="middle" fill="#8b949e" font-size="13">2 neutral</text>

  <line x1="445" y1="235" x2="625" y2="235" stroke="#30363d" stroke-width="1"/>

  <text x="535" y="260" text-anchor="middle" fill="#3fb950" font-size="15" font-weight="bold">→ AGGRESSIVE</text>
  <text x="535" y="282" text-anchor="middle" fill="#8b949e" font-size="12">90% stocks</text>
  <text x="535" y="300" text-anchor="middle" fill="#8b949e" font-size="12">10% cash</text>
  <text x="535" y="320" text-anchor="middle" fill="#8b949e" font-size="12">0% commodity</text>

  <!-- Arrow to MixLLM -->
  <line x1="655" y1="225" x2="700" y2="225" stroke="#58a6ff" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Right box: MixLLM -->
  <rect x="710" y="140" width="170" height="170" rx="10" fill="#161b22" stroke="#d2a8ff" stroke-width="2"/>
  <text x="795" y="168" text-anchor="middle" fill="#d2a8ff" font-size="14" font-weight="bold">MixLLM</text>
  <text x="795" y="190" text-anchor="middle" fill="#8b949e" font-size="11">Claude Opus reviews</text>

  <text x="795" y="220" text-anchor="middle" fill="#e6edf3" font-size="12">Crisis detected?</text>

  <text x="795" y="250" text-anchor="middle" fill="#3fb950" font-size="12">No → CONFIRM</text>
  <text x="795" y="272" text-anchor="middle" fill="#f0883e" font-size="12">Yes → ESCALATE</text>
  <text x="795" y="297" text-anchor="middle" fill="#8b949e" font-size="10">(can only go more</text>
  <text x="795" y="310" text-anchor="middle" fill="#8b949e" font-size="10">defensive, never less)</text>

  <!-- Bottom labels -->
  <text x="190" y="408" text-anchor="middle" fill="#8b949e" font-size="11">Mix reads their state</text>
  <text x="535" y="408" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">Mix: +36.7% avg</text>
  <text x="795" y="408" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="bold">MixLLM: +33.9% avg</text>
</svg>
